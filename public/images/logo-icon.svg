<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>

  <!-- Sparkle rays -->
  <g transform="translate(256,210)" fill="url(#spark)">
    <polygon points="0,-80 10,0 0,80 -10,0" opacity="0.3"/>
    <polygon points="-80,0 0,-10 80,0 0,10" opacity="0.3"/>
    <polygon points="0,-80 10,0 0,80 -10,0" transform="rotate(45)" opacity="0.3"/>
    <polygon points="-80,0 0,-10 80,0 0,10" transform="rotate(45)" opacity="0.3"/>
    
    <polygon points="0,-55 9,0 0,55 -9,0" opacity="0.6"/>
    <polygon points="-55,0 0,-9 55,0 0,9" opacity="0.6"/>
    <polygon points="0,-55 9,0 0,55 -9,0" transform="rotate(45)" opacity="0.6"/>
    <polygon points="-55,0 0,-9 55,0 0,9" transform="rotate(45)" opacity="0.6"/>

    <!-- Center glow -->
    <circle cx="0" cy="0" r="22" fill="#fef3c7"/>
  </g>

  <!-- Arabic number 1 -->
  <text x="256" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="160" font-weight="bold" fill="white">١</text>

  <!-- "أول مرة" text at bottom -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">أول مرة</text>
</svg>
